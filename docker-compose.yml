services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    image: ${IMAGE_BASE:-local}/mcp-server:${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=${COLLECTION_NAME:-distill}
      - DB_PATH=/data/queries.db
      - RERANKER=${RERANKER:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - RERANKER_CACHE_DIR=/data/reranker-cache
      - TIER_BOOST_4=${TIER_BOOST_4:-0.75}
      - CLIP_API_KEY=${CLIP_API_KEY:-}
      - DOCS_DIR=/docs
    volumes:
      - mcp_data:/data
      - ./docs:/docs
    depends_on:
      - qdrant
    restart: unless-stopped

  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    image: ${IMAGE_BASE:-local}/ingest:${IMAGE_TAG:-latest}
    volumes:
      - ./docs:/docs
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=${COLLECTION_NAME:-distill}
      - PYTHONUNBUFFERED=1
    depends_on:
      - qdrant
    profiles:
      - ingest

  ingest-watch:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    image: ${IMAGE_BASE:-local}/ingest:${IMAGE_TAG:-latest}
    command: ["--watch"]
    volumes:
      - ./docs:/docs
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=${COLLECTION_NAME:-distill}
      - PYTHONUNBUFFERED=1
    depends_on:
      - qdrant
    restart: unless-stopped
    profiles:
      - watch

  caddy:
    build:
      context: caddy
    image: ${IMAGE_BASE:-local}/caddy:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - TLS_MODE=${TLS_MODE:-internal}
      - TLS_DOMAIN=${TLS_DOMAIN:-distill.local}
      - TLS_DNS_PROVIDER=${TLS_DNS_PROVIDER:-}
      # Cloudflare
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      # Route53 (uses AWS SDK credential chain; also accepts AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # ACME-DNS
      - ACMEDNS_HOST=${ACMEDNS_HOST:-}
      # DigitalOcean
      - DO_AUTH_TOKEN=${DO_AUTH_TOKEN:-}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mcp-server
    restart: unless-stopped
    profiles:
      - tls

volumes:
  qdrant_data:
  mcp_data:
  caddy_data:
  caddy_config:
