name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  push:
    name: Push ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: mcp-server
            context: .
            file: mcp-server/Dockerfile
          - name: ingest
            context: .
            file: ingest/Dockerfile
          - name: caddy
            context: caddy
            file: caddy/Dockerfile

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          BASE="${{ env.IMAGE_BASE }}"
          NAME="${{ matrix.name }}"
          SHA="${{ github.sha }}"
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/}"
            echo "value=${BASE}/${NAME}:latest,${BASE}/${NAME}:${VERSION},${BASE}/${NAME}:${SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${BASE}/${NAME}:latest,${BASE}/${NAME}:${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    name: Deploy to server
    needs: push
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Pull and restart
        working-directory: /home/castrov/distill
        run: |
          git pull https://github.com/afly007/distill.git main
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u afly007 --password-stdin
          docker compose pull
          docker compose --profile ingest pull ingest
          docker compose --profile tls pull caddy 2>/dev/null || true
          docker compose up -d
          docker image prune -f
