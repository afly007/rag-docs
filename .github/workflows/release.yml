name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  push:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          BASE="${{ env.IMAGE_BASE }}"
          SHA="${{ github.sha }}"
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/}"
            echo "mcp_tags=${BASE}/mcp-server:latest,${BASE}/mcp-server:${VERSION},${BASE}/mcp-server:${SHA}" >> "$GITHUB_OUTPUT"
            echo "ingest_tags=${BASE}/ingest:latest,${BASE}/ingest:${VERSION},${BASE}/ingest:${SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "mcp_tags=${BASE}/mcp-server:latest,${BASE}/mcp-server:${SHA}" >> "$GITHUB_OUTPUT"
            echo "ingest_tags=${BASE}/ingest:latest,${BASE}/ingest:${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push mcp-server
        uses: docker/build-push-action@v7
        with:
          context: ./mcp-server
          push: true
          tags: ${{ steps.tags.outputs.mcp_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ingest
        uses: docker/build-push-action@v7
        with:
          context: ./ingest
          push: true
          tags: ${{ steps.tags.outputs.ingest_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    needs: push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/rag-docs
            git pull origin main
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
