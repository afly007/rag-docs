name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.4.9

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build ingest
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ingest/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build mcp-server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: mcp-server/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build caddy
        uses: docker/build-push-action@v7
        with:
          context: caddy
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
